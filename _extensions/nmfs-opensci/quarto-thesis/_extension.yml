title: quarto-thesis
author: Eli Holmes
version: 0.2.5
contributes:
  format:
    pdf:
      documentclass: MastersDoctoralThesis
      classoption: ["12pt", "english", "doublespacing", "", "oneside"]
      format-resources:
        - MastersDoctoralThesis.cls
      template-partials: 
        - "partials/title.tex"
        - "partials/before-body.tex"
      toc: false
      toc-depth: 3
      include-before-body: 
        - partials/definitions.tex
      include-in-header: 
        - partials/in-header.tex
      geometry: 
        - inner=2.5cm
        - outer=2.2cm
        - bindingoffset=.5cm
        - top=2.0cm
        - bottom=2.0cm
      colorlinks: true
      citecolor: magenta
      linkcolor: blue
      urlcolor: red
      toclinkcolor: black
